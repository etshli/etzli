<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- תגיות SEO ומידע -->
    <title>עמוד לא נמצא - עץלי</title>
    <meta name="theme-color" content="#06b6d4">

    <!-- RealFaviconGenerator Icons -->
    <link rel="icon" type="image/png" href="favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="shortcut icon" href="favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="etzli" />
    <link rel="manifest" href="site.webmanifest" />
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- אייקונים מ-FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- קישור לקובץ העיצוב שלנו -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50 text-gray-800 overflow-x-hidden flex flex-col min-h-screen">

    <!-- ניווט עליון -->
    <nav class="bg-white shadow-sm fixed w-full z-50 top-0">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <!-- קישור בחזרה לשורש (דף הבית) ב-GitHub Pages -->
            <a href="./" class="text-2xl font-black text-cyan-500 flex items-center gap-2 hover:opacity-80 transition">
                <i class="fa-solid fa-leaf text-green-500"></i> עץלי
            </a>
        </div>
    </nav>

    <!-- אזור השגיאה 404 -->
    <main class="flex-grow flex items-center justify-center pt-20 px-6 relative">
        <!-- עיגולי רקע דקורטיביים -->
        <div class="absolute top-1/4 right-10 w-64 h-64 bg-cyan-50 rounded-full blur-3xl -z-10 opacity-60"></div>
        <div class="absolute bottom-1/4 left-10 w-72 h-72 bg-orange-50 rounded-full blur-3xl -z-10 opacity-60"></div>

        <div class="text-center max-w-lg mx-auto bg-white p-10 md:p-16 rounded-[40px] shadow-xl border border-gray-100 relative">
            
            <!-- המספר 404 עם אייקון של צמח נבול -->
            <div class="relative inline-block mb-6">
                <h1 class="text-8xl md:text-9xl font-black text-gray-100 tracking-tighter">404</h1>
                <div class="absolute inset-0 flex items-center justify-center">
                    <div class="bg-orange-100 text-orange-500 w-20 h-20 md:w-24 md:h-24 rounded-full flex items-center justify-center text-4xl md:text-5xl shadow-sm border-4 border-white">
                        <i class="fa-solid fa-plant-wilt"></i>
                    </div>
                </div>
            </div>

            <!-- טקסט השגיאה -->
            <h2 class="text-2xl md:text-3xl font-black text-gray-900 mb-4">אופס! נראה שהעמוד הזה התייבש...</h2>
            <p class="text-gray-500 mb-8 text-lg">
                הגעתם לנתיב שאין בו מים, או שהעמוד הזה פשוט לא נשתל מעולם. אל דאגה, בואו נחזור לשורשים למקום בטוח ומושקה היטב.
            </p>

            <!-- כפתור חזרה -->
            <a href="./" class="inline-flex items-center justify-center gap-3 bg-cyan-500 hover:bg-cyan-600 text-white font-bold py-4 px-8 rounded-2xl transition shadow-lg shadow-cyan-500/30 hover:-translate-y-1">
                <i class="fa-solid fa-droplet text-xl"></i>
                <span>חזרה לדף הבית</span>
            </a>
        </div>
    </main>

    <!-- קרדיטים -->
    <footer class="bg-gray-950 py-6 text-center text-gray-500 text-sm mt-auto">
        <p>© <span id="currentYear404"></span> עץלי (Etzli). כל הזכויות שמורות.</p>
    </footer>

    <script>
        document.getElementById('currentYear404').textContent = new Date().getFullYear();
    </script>
</body>
</html>
